kind = "mobile"
previewPath = "/"
title = "Comanda Eletrônica"
version = "1.0.0"
id = "artifacts/comanda"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21448
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/comanda run dev"

[services.env]
PORT = "21448"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/comanda", "run", "build"]
run = ["pnpm", "--filter", "@workspace/comanda", "run", "serve"]
